<!DOCTYPE html>
<html>
<head>
    <title>Iris Flower Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🌸 Falling Flowers -->
<div class="flowers">
    <span>🌸</span>
    <span>🌸</span>
    <span>🌸</span>
    <span>🌸</span>
    <span>🌸</span>
</div>

<div class="container">
    <h2>🌸 Iris Flower Predictor</h2>

    <form action="/predict" method="post">
        <input type="text" name="sl" placeholder="Sepal Length" required>
        <input type="text" name="sw" placeholder="Sepal Width" required>
        <input type="text" name="pl" placeholder="Petal Length" required>
        <input type="text" name="pw" placeholder="Petal Width" required>

        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h3>Flower: {{ result }}</h3>
        <img src="{{ url_for('static', filename='images/' + image) }}" width="150">
    {% endif %}
</div>

</body>
</html>
